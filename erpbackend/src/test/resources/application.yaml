spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.orm.jpa.autoconfigure.HibernateJpaAutoConfiguration
      - org.springframework.boot.orm.jpa.autoconfigure.JpaRepositoriesAutoConfiguration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/erp
          jwk-set-uri: http://localhost:8180/realms/erp/protocol/openid-connect/certs

keycloak:
  realm: erp
  auth-server-url: http://localhost:8180
  client-id: erp-backend
  admin:
    server-url: http://localhost:8180
    realm: erp
    client-id: erp-backend
    client-secret: test-secret
