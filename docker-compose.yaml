services:
  postgres:
    image: postgres:15-alpine
    container_name: erp_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password}
      POSTGRES_DB: ${POSTGRES_DB:-erp_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_user} -d ${POSTGRES_DB:-erp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  erp-backend: 
    build:
      context: ./erpbackend
      dockerfile: Dockerfile
    container_name: erp_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-erp_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-erp_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-erp_password}
    ports:
      - "8089:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: